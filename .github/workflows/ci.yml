name: CI

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  test:
    name: Lint, unit tests, coverage, E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Type check
        run: bunx tsc --noEmit

      - name: Unit tests + coverage (audit export modules)
        # Run the full vitest suite, but report coverage scoped to the
        # audit-export modules so regressions in those files show up clearly.
        run: |
          bunx vitest run \
            --coverage \
            --coverage.provider=v8 \
            --coverage.reporter=text \
            --coverage.reporter=text-summary \
            --coverage.reporter=lcov \
            --coverage.reporter=json-summary \
            --coverage.include='src/lib/auditExport.ts' \
            --coverage.include='src/components/auth/LastExportBlock.tsx' \
            --coverage.thresholds.lines=85 \
            --coverage.thresholds.functions=85 \
            --coverage.thresholds.statements=85 \
            --coverage.thresholds.branches=70

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-audit-export
          path: |
            coverage/lcov.info
            coverage/coverage-summary.json
          if-no-files-found: warn

      - name: Coverage summary in PR
        if: always() && hashFiles('coverage/coverage-summary.json') != ''
        run: |
          echo "## Audit Export Coverage" >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          cat coverage/coverage-summary.json >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Build app for E2E
        run: bun run build

      - name: E2E tests (Playwright)
        run: bunx playwright test
        env:
          CI: "true"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore
